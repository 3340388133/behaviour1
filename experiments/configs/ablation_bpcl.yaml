# 消融实验: 仅启用BPCL (行为原型对比学习)

model:
  name: "SBRN"
  pose_input_dim: 3
  d_model: 128
  nhead: 8
  num_layers: 4
  dim_feedforward: 512
  dropout: 0.1
  num_classes: 3

  # 仅启用BPCL
  use_multimodal: false
  use_contrastive: true  # BPCL
  use_relative_bias: false
  uncertainty_weighting: false

  # BPCL参数
  num_prototypes_per_class: 3
  temperature: 0.07
  contrastive_margin: 0.5

training:
  epochs: 50
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0001

  # 对比学习权重
  contrastive_weight: 0.3

  # 标准CE损失
  use_focal_loss: false
  focal_gamma: 0.0

  # 标准采样
  use_balanced_sampler: false

  # 无Mixup
  use_mixup: false

  lr_scheduler: "cosine"
  lr_warmup_epochs: 5
  early_stopping_patience: 10

data:
  train_path: "data/tracked_output"
  val_split: 0.2
  seq_len: 32
  fps: 30

logging:
  log_dir: "experiments/logs/ablation_bpcl"
  save_every: 10
  eval_every: 1
