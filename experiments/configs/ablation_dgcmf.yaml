# 消融实验: 仅启用DGCMF (动态门控跨模态融合)

model:
  name: "SBRN"
  pose_input_dim: 3
  appearance_dim: 512
  motion_dim: 64
  d_model: 128
  nhead: 8
  num_layers: 4
  dim_feedforward: 512
  dropout: 0.1
  num_classes: 3

  # 仅启用DGCMF
  use_multimodal: true  # DGCMF
  use_quality_estimation: true
  use_contrastive: false
  use_relative_bias: false
  uncertainty_weighting: false

training:
  epochs: 50
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0001

  # 标准CE损失
  use_focal_loss: false
  focal_gamma: 0.0

  # 标准采样
  use_balanced_sampler: false

  # 无Mixup
  use_mixup: false

  lr_scheduler: "cosine"
  lr_warmup_epochs: 5
  early_stopping_patience: 10

data:
  train_path: "data/tracked_output"
  val_split: 0.2
  seq_len: 32
  fps: 30

  # 需要额外特征
  use_appearance: true
  use_motion: true

logging:
  log_dir: "experiments/logs/ablation_dgcmf"
  save_every: 10
  eval_every: 1
